name: Deploy FastAPI App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check . || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest httpx
      - run: pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            APP_DIR="$HOME/apps/deployment-demo"
            mkdir -p "$APP_DIR"

            cd "$APP_DIR"
            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            python3 -m venv "$APP_DIR/venv"
            source "$APP_DIR/venv/bin/activate"
            pip install --upgrade pip
            pip install -r requirements.txt

            # Install systemd service on first deploy
            systemctl --user daemon-reload
            systemctl --user enable --now deployment-demo || true
            systemctl --user restart deployment-demo || true

      - name: Verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            systemctl --user status deployment-demo --no-pager -l 2>&1 || true
            sleep 2
            curl -sf http://localhost:8100/health 2>&1 || echo "Health check not yet responding"
